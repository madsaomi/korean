{% extends 'error_base.html' %}
{% block title %}404 — Страница не найдена{% endblock %}
{% block error_content %}
<div class="error-icon">🔍</div>
<div class="error-code">404</div>
<div class="error-title">Страница не найдена</div>
<div class="error-desc">Такой страницы не существует. Возможно, она была удалена или ты перешёл по неверной ссылке.</div>
<a href="{% url 'index' %}" class="btn-glass btn-accent">🏠 На главную</a>
{% endblock %}
