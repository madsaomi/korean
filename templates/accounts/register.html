{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="glass-card auth-card">
  <span class="auth-icon">📝</span>
  <h2>Регистрация</h2>
  <form method="POST">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn-glass btn-accent w-100 mt-3 py-2">Создать аккаунт</button>
  </form>
  <p class="text-center mt-3 mb-0" style="color: var(--text-secondary);">
    Уже есть аккаунт? <a href="{% url 'login' %}" style="color: var(--accent); font-weight: 600;">Войти</a>
  </p>
</div>
{% endblock %}
