{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Редактировать профиль{% endblock %}
{% block content %}
<a href="{% url 'profile' %}" class="btn-glass text-decoration-none mb-3 d-inline-block">← Назад</a>

<div class="glass-card p-4" style="max-width: 500px; margin: 0 auto;">
  <h3 class="fw-bold mb-4">✏️ Редактировать профиль</h3>
  <form method="POST">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn-glass btn-accent w-100 mt-3">Сохранить</button>
  </form>
</div>
{% endblock %}
