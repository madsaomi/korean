{% load static %}<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ошибка{% endblock %} — 한글</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --accent: #7f5af0; --bg-primary: #0f0e17; --glass-bg: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.08); --text-primary: #fffffe; --text-secondary: #94a1b2; }
    body { background: var(--bg-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: .15; pointer-events: none; }
    .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: #a78bfa; bottom: -80px; right: -80px; }
    .orb-3 { width: 200px; height: 200px; background: #22c55e; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    .error-card { background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 3rem; max-width: 480px; width: 90%; text-align: center; position: relative; z-index: 1; }
    .error-code { font-size: 5rem; font-weight: 800; background: linear-gradient(135deg,var(--accent),#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: .5rem; }
    .error-icon { font-size: 3rem; margin-bottom: .5rem; }
    .error-title { font-size: 1.3rem; font-weight: 700; color: var(--text-primary); margin-bottom: .5rem; }
    .error-desc { color: var(--text-secondary); font-size: .95rem; margin-bottom: 1.5rem; line-height: 1.5; }
    .btn-glass { display: inline-block; padding: .6rem 1.5rem; border-radius: 50px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-primary); text-decoration: none; font-size: .9rem; transition: all .2s; }
    .btn-glass:hover { background: rgba(127,90,240,.15); border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    .btn-accent { background: rgba(127,90,240,.2); border-color: var(--accent); color: var(--accent); }
    .bubbles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .bubble { position: absolute; border-radius: 50%; background: rgba(127,90,240,.06); animation: float 20s infinite ease-in-out; }
    .bubble:nth-child(1) { width: 60px; height: 60px; top: 20%; left: 10%; animation-delay: 0s; }
    .bubble:nth-child(2) { width: 40px; height: 40px; top: 60%; left: 80%; animation-delay: -5s; }
    .bubble:nth-child(3) { width: 80px; height: 80px; top: 80%; left: 20%; animation-delay: -10s; }
    .bubble:nth-child(4) { width: 30px; height: 30px; top: 10%; left: 70%; animation-delay: -15s; }
    .bubble:nth-child(5) { width: 50px; height: 50px; top: 40%; left: 50%; animation-delay: -7s; }
    @keyframes float { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.1); } }
  </style>
</head>
<body>
  <div class="bubbles"><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div></div>
  <div class="orb orb-1"></div><div class="orb orb-2"></div>
  <div class="error-card">
    {% block error_content %}{% endblock %}
  </div>
</body>
</html>
