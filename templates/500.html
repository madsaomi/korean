{% extends 'error_base.html' %}
{% block title %}500 — Ошибка сервера{% endblock %}
{% block error_content %}
<div class="error-icon">💥</div>
<div class="error-code">500</div>
<div class="error-title">Что-то пошло не так</div>
<div class="error-desc">На сервере произошла ошибка. Мы уже знаем о проблеме и скоро всё починим.</div>
<a href="{% url 'index' %}" class="btn-glass btn-accent">🏠 На главную</a>
<br><br>
<small style="color:var(--text-secondary);font-size:.8rem;display:block;margin-top:.5rem;">Попробуй обновить страницу через пару минут</small>
{% endblock %}
