<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нет соединения — K-lab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0f0e17; color: #fffffe;
  }
  .card {
    text-align: center; padding: 2.5rem; max-width: 400px;
    background: rgba(255,255,255,0.06); backdrop-filter: blur(16px);
    border-radius: 24px; border: 1px solid rgba(255,255,255,0.08);
  }
  h1 { font-size: 3rem; margin-bottom: 1rem; }
  p { font-size: 1.1rem; color: rgba(255,255,255,0.7); margin-bottom: 1.5rem; }
  .btn {
    display: inline-block; padding: 0.75rem 2rem; border-radius: 50px;
    background: #7f5af0; color: #fffffe; text-decoration: none; font-weight: 600;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .hint { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-top: 1rem; }
</style>
</head>
<body>
  <div class="card">
    <h1>📡</h1>
    <p>Похоже, вы потеряли соединение с интернетом.</p>
    <a href="/" class="btn">Попробовать снова</a>
    <p class="hint">Некоторые страницы могут быть доступны офлайн.</p>
  </div>
</body>
</html>
